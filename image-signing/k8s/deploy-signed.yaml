apiVersion: apps/v1
kind: Deployment
metadata:
  name: signed-app
  namespace: lab-signed
  labels:
    app: signed-app
    signed: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: signed-app
  template:
    metadata:
      labels:
        app: signed-app
    spec:
      containers:
        - name: signed-app
          image: SIGNED_IMAGE_PLACEHOLDER
          ports:
            - containerPort: 8080
          env:
            - name: APP_VERSION
              value: "1.0-signed"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: signed-app
  namespace: lab-signed
spec:
  selector:
    app: signed-app
  ports:
    - port: 8080
      targetPort: 8080
  type: ClusterIP
